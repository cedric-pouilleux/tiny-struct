version: "3.8"

services:
  nuxt-app:
    image: nuxt_app_integ:latest
    build:
      context: ..
      dockerfile: devbox/Dockerfile.prod
    container_name: nuxt_int
    ports:
      - "4000:3000"
    env_file:
      - ./env/.env.integration
    depends_on:
      database-int:
        condition: service_healthy
    networks:
      - app_network

  database-int:
    image: postgres:15
    container_name: postgres_int
    restart: always
    volumes:
      - pg_data_int:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=mydb_test
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    container_name: nginx_int
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nuxt-app
    networks:
      - app_network

volumes:
  pg_data_int:
    driver: local

networks:
  app_network:
    driver: bridge
