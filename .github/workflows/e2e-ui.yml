name: Build, test and deploy integration

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🔑 Connect to Staging VM & Run Tests
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /home/github-ci/tiny-struct/
            git fetch --all
            git reset --hard origin/main
            git pull origin main --ff-only

            cd /home/github-ci/tiny-struct/devbox
            docker compose build nuxt-app-staging

  e2e-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: 🔑 Connect to Staging VM & Run Playwright tests
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e  # Arrête immédiatement si une commande échoue
            cd /home/github-ci/tiny-struct/devbox
            echo "Running Playwright tests..."
            docker compose up --abort-on-container-exit nuxt-app-staging e2e-tests || exit 1
