name: Build, test and deploy integration

on:
  push:
    branches:
      - main

concurrency:
  group: build-nuxt
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Nuxt App (Staging)
        run: |
          cd devbox
          docker compose build nuxt-app-staging

      - name: 🚀 Start Nuxt App (Docker)
        run: |
          cd devbox
          docker compose up -d nuxt-app-staging

  tests:
    runs-on: ubuntu-latest
    needs: build-staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install pnpm
        run: |
          cd app/
          corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install

      - name: 🔎 Run ESLint
        run: pnpm lint

      - name: 🔍 Run TypeScript Type Check
        run: pnpm typecheck

      - name: 🧒 Run Unit Tests
        run: pnpm test:unit

  e2e-tests:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Start Playwright tests
        run: |
          cd devbox
          docker compose run --rm playwright pnpm test:e2e

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: Tag and Push Image to Docker Hub
        run: |
          docker tag nuxt-app-staging ${{ secrets.DOCKER_HUB_USERNAME }}/nuxt_app:latest
          docker tag nuxt-app-staging ${{ secrets.DOCKER_HUB_USERNAME }}/nuxt_app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/nuxt_app:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/nuxt_app:${{ github.sha }}

  deploy-int:
    runs-on: ubuntu-latest
    needs: e2e-tests
    steps:
      - name: Deploy to Integration VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e  # stop if throw error

            echo "Logging into Docker Hub..."
            docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} -p ${{ secrets.DOCKER_HUB_TOKEN }}

            echo "Pulling latest Nuxt image..."
            if docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/nuxt_app:latest; then
              echo "Image pulled successfully !"
            else
              echo "Failed to pull image, aborting deployment"
              exit 1
            fi

            echo "Stopping previous integration environment..."
            cd /home/github-ci/tiny-struct/devbox
            ./run.sh stop int || echo "⚠️ Warning: Failed to stop previous instance"

            echo "Starting new integration environment..."
            ./run.sh start int

            echo "Logging out of Docker Hub..."
            docker logout

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-int
    steps:
      - name: Deploy to Production VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} -p ${{ secrets.DOCKER_HUB_TOKEN }}
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/nuxt_app:latest
            cd /home/github-ci/tiny-struct/devbox
            ./run.sh stop prod
            ./run.sh start prod 
            docker image prune -f
            docker logout
